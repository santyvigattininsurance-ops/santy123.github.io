<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #38761d, #6aa84f);
        }

        .header {
            text-align: center;
            padding: 80px 20px 40px;
            color: white;
        }

        .header h1 {
            font-size: 50px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .header p {
            font-size: 18px;
            margin-top: 10px;
            opacity: 0.9;
            font-weight: 300;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: #38761d;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #d9ead3;
        }

</head>
<body>

    <div class="header">
        <h1>LICENSED NON-INSURANCE ADVISOR</h1>

        <button class="btn" onclick="window.location.href='quotation.html'">

        </button>
